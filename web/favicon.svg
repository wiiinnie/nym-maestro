<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- rounded dark tile matching the dashboard dark theme background 1a1916 -->
  <rect x="0" y="0" width="48" height="48" rx="10" fill="#1a1916"/>

  <!-- nym maestro brand mark: hexagonal node graph, six outer nodes around a
       central hub, identical geometry to the UI header logo. Accent is the
       dark theme mint 5dcaa5. -->
  <g stroke="#5dcaa5" stroke-width="1" opacity="0.5">
    <line x1="24" y1="24" x2="39" y2="24"/>
    <line x1="24" y1="24" x2="31.5" y2="11"/>
    <line x1="24" y1="24" x2="16.5" y2="11"/>
    <line x1="24" y1="24" x2="9" y2="24"/>
    <line x1="24" y1="24" x2="16.5" y2="37"/>
    <line x1="24" y1="24" x2="31.5" y2="37"/>
  </g>
  <g fill="#5dcaa5">
    <circle cx="39" cy="24" r="2.3"/>
    <circle cx="31.5" cy="11" r="2.3" opacity="0.6"/>
    <circle cx="16.5" cy="11" r="2.3"/>
    <circle cx="9" cy="24" r="2.3" opacity="0.6"/>
    <circle cx="16.5" cy="37" r="2.3"/>
    <circle cx="31.5" cy="37" r="2.3" opacity="0.6"/>
    <circle cx="24" cy="24" r="3.6"/>
  </g>
</svg>
