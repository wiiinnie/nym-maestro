<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nym maestro</title>
<style>
  :root{
    --bg:#fbfaf7; --surface:#ffffff; --surface-2:#f3f1ea; --line:#e4e1d7;
    --text:#26251f; --muted:#76746a; --faint:#a3a097;
    --accent:#0f6e56; --accent-soft:#e1f5ee;
    --ok:#1d7a4d; --ok-soft:#e6f3ea; --warn:#9a6a0b; --warn-soft:#faeeda;
    --danger:#a3322d; --danger-soft:#f8e9e7;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --r:8px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#1a1916; --surface:#242220; --surface-2:#2c2a26; --line:#37352f;
      --text:#e9e6dd; --muted:#a3a097; --faint:#76746a;
      --accent:#5dcaa5; --accent-soft:#143a30;
      --ok:#6fce93; --ok-soft:#16331f; --warn:#e0a93a; --warn-soft:#3a2c0c;
      --danger:#e88a82; --danger-soft:#3a1714;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 24px 80px}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}
  .brand{font-size:20px;font-weight:600;letter-spacing:-0.01em}
  .brand small{display:block;font-size:13px;font-weight:400;color:var(--muted);letter-spacing:0;margin-top:2px}
  .health{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);background:var(--surface-2);padding:6px 11px;border-radius:var(--r)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--faint);flex:none}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--danger)}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .metric{background:var(--surface-2);border-radius:var(--r);padding:13px 15px}
  .metric .k{font-size:13px;color:var(--muted)}
  .metric .v{font-size:25px;font-weight:600;margin-top:1px}
  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:6px}
  .bar .spacer{flex:1}
  .actions-note{font-size:12px;color:var(--faint);margin:0 0 14px}
  button{font-family:var(--sans);font-size:13px;display:inline-flex;align-items:center;gap:6px;
    padding:7px 12px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface);
    color:var(--text);cursor:pointer}
  button:hover{background:var(--surface-2)}
  button:disabled{opacity:.45;cursor:default}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{filter:brightness(.96)}
  button.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:5px 8px}
  button.ghost:hover{background:var(--surface-2);color:var(--text)}
  input,textarea{font-family:var(--sans);font-size:14px;width:100%;padding:8px 10px;border:1px solid var(--line);
    border-radius:var(--r);background:var(--surface);color:var(--text)}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .filter{position:relative;max-width:240px}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  th{font-size:12px;font-weight:500;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .name{font-weight:600}
  .sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .mono{font-family:var(--mono);font-size:13px}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 8px;border-radius:var(--r);
    background:var(--surface-2);color:var(--muted);white-space:nowrap}
  .pill.ok{background:var(--ok-soft);color:var(--ok)}
  .pill.warn{background:var(--warn-soft);color:var(--warn)}
  .pill.info{background:var(--accent-soft);color:var(--accent)}
  .pill.bad{background:var(--danger-soft);color:var(--danger)}
  .faint{color:var(--faint)}
  .row-actions{display:flex;gap:2px;justify-content:flex-end}
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty h3{color:var(--text);font-weight:600;margin:0 0 6px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:12px;width:100%;max-width:460px;padding:22px 24px}
  .modal h2{margin:0 0 16px;font-size:17px;font-weight:600}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
  .field .hint{font-size:12px;color:var(--faint);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .checkrow{display:flex;align-items:center;gap:8px;margin:4px 0 2px}
  .checkrow input{width:auto}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);
    padding:10px 16px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:30}
  .toast.show{opacity:1}
  .toast.bad{background:var(--danger)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">nym maestro<small>hermes fleet · node control</small></div>
    <div class="health"><span id="hdot" class="dot"></span><span id="htext">connecting…</span></div>
  </header>

  <div class="metrics">
    <div class="metric"><div class="k">Nodes</div><div class="v" id="m-total">—</div></div>
    <div class="metric"><div class="k">Online</div><div class="v" id="m-online">—</div></div>
    <div class="metric"><div class="k">Offline</div><div class="v" id="m-offline">—</div></div>
  </div>

  <div class="bar">
    <button disabled>Upgrade</button>
    <button disabled>Restart</button>
    <button disabled>Toggle</button>
    <button disabled>Backup</button>
    <button disabled>Fail2ban</button>
    <button disabled>Run…</button>
    <span class="spacer"></span>
    <div class="filter"><input id="filter" type="text" placeholder="filter nodes" autocomplete="off"></div>
    <button class="primary" onclick="openModal('add')">Add node</button>
    <button onclick="load()" title="Reload from cache">Refresh</button>
  </div>
  <p class="actions-note">Bulk actions unlock once node agents are connected.</p>

  <div id="tablewrap"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Add node</h2>
    <div class="field">
      <label for="f-node_id">Node id</label>
      <input id="f-node_id" placeholder="id used at nym-node init">
      <div class="hint" id="f-node_id-hint">The id you initialised the node with. Cannot be changed later.</div>
    </div>
    <div class="grid2">
      <div class="field"><label for="f-name">Name</label><input id="f-name" placeholder="CH01"></div>
      <div class="field"><label for="f-ip">IP address</label><input id="f-ip" placeholder="51.83.0.0"></div>
    </div>
    <div class="grid2">
      <div class="field"><label for="f-hostname">Hostname</label><input id="f-hostname" placeholder="optional"></div>
      <div class="field"><label for="f-agent_port">Agent port</label><input id="f-agent_port" type="number" value="8443"></div>
    </div>
    <div class="field">
      <label for="f-notes">Notes</label>
      <input id="f-notes" placeholder="optional">
    </div>
    <div class="checkrow"><input id="f-enabled" type="checkbox" checked><label for="f-enabled" style="margin:0">Enabled</label></div>
    <div class="modal-actions">
      <button class="ghost" id="modal-delete" style="display:none">Delete node</button>
      <span class="spacer" style="flex:1"></span>
      <button class="ghost" onclick="closeModal()">Cancel</button>
      <button class="primary" id="modal-save" onclick="saveNode()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let nodes = [];
let editingId = null;

async function api(path, opts){
  const res = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'}}, opts));
  if(res.status === 204) return null;
  const body = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(body.error || ('request failed ('+res.status+')'));
  return body;
}

function toast(msg, bad){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (bad ? ' bad' : '');
  setTimeout(()=>{ t.className = 'toast'; }, 2600);
}

async function health(){
  const dot = document.getElementById('hdot'), txt = document.getElementById('htext');
  try{
    const h = await api('/api/health');
    dot.className = 'dot ok'; txt.textContent = 'orchestrator ' + h.version;
  }catch(e){
    dot.className = 'dot bad'; txt.textContent = 'orchestrator unreachable';
  }
}

async function load(){
  try{
    nodes = await api('/api/nodes');
    renderMetrics(); renderTable();
  }catch(e){ toast(e.message, true); }
}

function renderMetrics(){
  const total = nodes.length;
  const online = nodes.filter(n => n.status && n.status.reachable).length;
  const offline = nodes.filter(n => n.enabled && (!n.status || !n.status.reachable)).length;
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-online').textContent = online;
  document.getElementById('m-offline').textContent = offline;
}

function el(tag, cls, text){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text != null) e.textContent = text;
  return e;
}

function rolesCell(s){
  const wrap = el('td');
  if(!s){ wrap.append(dash()); return wrap; }
  const roles = [];
  if(s.exit) roles.push('exit');
  if(s.entry) roles.push('entry');
  if(s.mixnode) roles.push('mix');
  if(roles.length === 0 && s.mode) roles.push(s.mode);
  if(roles.length === 0){ wrap.append(dash()); return wrap; }
  roles.forEach(r => { const p = el('span','pill',r); p.style.marginRight='4px'; wrap.append(p); });
  return wrap;
}

function dash(){ return el('span','faint','—'); }

function statePill(val, onText, offText){
  if(val == null) return dash();
  return val ? el('span','pill info', onText) : el('span','pill', offText);
}

function renderTable(){
  const wrap = document.getElementById('tablewrap');
  wrap.innerHTML = '';
  const q = (document.getElementById('filter').value || '').toLowerCase();
  const shown = nodes.filter(n =>
    !q || [n.name, n.ip, n.hostname, n.node_id].some(v => (v||'').toLowerCase().includes(q)));

  if(nodes.length === 0){
    const e = el('div','empty');
    e.append(el('h3', null, 'No nodes yet'));
    e.append(el('p', null, 'Add your first node to start building the fleet.'));
    const b = el('button','primary','Add node'); b.onclick = ()=>openModal('add');
    b.style.marginTop = '12px'; e.append(b);
    wrap.append(e); return;
  }

  const table = el('table');
  const thead = el('thead'); const htr = el('tr');
  ['Node','Version','Roles','WG','Service','Bans',''].forEach(h => htr.append(el('th',null,h)));
  thead.append(htr); table.append(thead);

  const tbody = el('tbody');
  shown.forEach(n => {
    const s = n.status;
    const tr = el('tr');

    const nameTd = el('td');
    const nameWrap = el('div',null);
    const nrow = el('div'); nrow.style.display='flex'; nrow.style.alignItems='center'; nrow.style.gap='7px';
    const d = el('span','dot');
    if(s && s.reachable) d.className = 'dot ok';
    else if(n.enabled) d.className = 'dot bad';
    nrow.append(d, el('span','name', n.name));
    nameWrap.append(nrow);
    const sub = [n.ip, n.hostname].filter(Boolean).join(' · ');
    nameWrap.append(el('div','sub', sub || n.node_id));
    nameTd.append(nameWrap);
    tr.append(nameTd);

    const vTd = el('td');
    vTd.append(s && s.version ? el('span','mono', s.version) : dash());
    tr.append(vTd);

    tr.append(rolesCell(s));

    const wgTd = el('td');
    wgTd.append(statePill(s ? s.wireguard : null, 'on', 'off'));
    tr.append(wgTd);

    const svcTd = el('td');
    if(!s || s.service_active == null) svcTd.append(dash());
    else svcTd.append(s.service_active ? el('span','pill ok','active') : el('span','pill bad','down'));
    tr.append(svcTd);

    const bTd = el('td');
    bTd.append(s && s.fail2ban_banned != null ? el('span','mono', String(s.fail2ban_banned)) : dash());
    tr.append(bTd);

    const aTd = el('td');
    const ra = el('div','row-actions');
    const edit = el('button','ghost','Edit'); edit.onclick = ()=>openModal('edit', n);
    const del = el('button','ghost','Delete'); del.onclick = ()=>removeNode(n);
    ra.append(edit, del); aTd.append(ra); tr.append(aTd);

    tbody.append(tr);
  });
  table.append(tbody);
  wrap.append(table);
}

function setField(id, val){ document.getElementById(id).value = val == null ? '' : val; }

function openModal(mode, node){
  editingId = mode === 'edit' ? node.node_id : null;
  document.getElementById('modal-title').textContent = mode === 'edit' ? 'Edit node' : 'Add node';
  const idInput = document.getElementById('f-node_id');
  idInput.disabled = mode === 'edit';
  document.getElementById('f-node_id-hint').textContent = mode === 'edit'
    ? 'The node id is the identity and cannot be changed.'
    : 'The id you initialised the node with. Cannot be changed later.';

  setField('f-node_id', node ? node.node_id : '');
  setField('f-name', node ? node.name : '');
  setField('f-ip', node ? node.ip : '');
  setField('f-hostname', node ? node.hostname : '');
  setField('f-agent_port', node ? node.agent_port : 8443);
  setField('f-notes', node ? node.notes : '');
  document.getElementById('f-enabled').checked = node ? node.enabled : true;
  document.getElementById('modal-delete').style.display = mode === 'edit' ? 'inline-flex' : 'none';
  document.getElementById('modal-delete').onclick = node ? ()=>removeNode(node, true) : null;

  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById(mode==='edit'?'f-name':'f-node_id').focus(), 30);
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

async function saveNode(){
  const payload = {
    name: document.getElementById('f-name').value.trim(),
    ip: document.getElementById('f-ip').value.trim(),
    hostname: document.getElementById('f-hostname').value.trim(),
    agent_port: parseInt(document.getElementById('f-agent_port').value, 10) || 8443,
    notes: document.getElementById('f-notes').value.trim(),
    enabled: document.getElementById('f-enabled').checked,
  };
  try{
    if(editingId){
      await api('/api/nodes/' + encodeURIComponent(editingId), {method:'PATCH', body: JSON.stringify(payload)});
      toast('Saved ' + payload.name);
    }else{
      payload.node_id = document.getElementById('f-node_id').value.trim();
      await api('/api/nodes', {method:'POST', body: JSON.stringify(payload)});
      toast('Added ' + payload.name);
    }
    closeModal(); await load();
  }catch(e){ toast(e.message, true); }
}

async function removeNode(node, fromModal){
  if(!confirm('Delete node "' + node.name + '"? This cannot be undone.')) return;
  try{
    await api('/api/nodes/' + encodeURIComponent(node.node_id), {method:'DELETE'});
    toast('Deleted ' + node.name);
    if(fromModal) closeModal();
    await load();
  }catch(e){ toast(e.message, true); }
}

document.getElementById('filter').addEventListener('input', renderTable);
document.getElementById('overlay').addEventListener('click', e => { if(e.target.id === 'overlay') closeModal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

health();
load();
</script>
</body>
</html>
